volumes:
  pgdata:
    name: pgdata

services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_ready -U root -d postgres"]
      interval: 1m30s
      start_period: 30s
      start_interval: 30s
      retries: 3
